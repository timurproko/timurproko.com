<!doctype html>
<html lang="en">
<head>

  <title>Timur Prokopiev – UX / XR / AI Experience Engineer</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      oklch(99% 0.002 240);
      --surface: oklch(100% 0 0);
      --fg:      oklch(18% 0.012 250);
      --muted:   oklch(54% 0.012 250);
      --subtle:  oklch(72% 0.004 250);
      --border:  oklch(92% 0.005 250);
      --accent:  oklch(58% 0.18 255);
      --accent-dim: oklch(58% 0.18 255 / 0.08);
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; }

    /* Nav */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: oklch(99% 0.002 240 / 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--fg);
      text-decoration: none;
      background: linear-gradient(90deg, #ff4d6d, #ffb703, #3ddc97, #3a86ff, #b517ff, #ff4d6d);
      background-size: 220% 100%;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      clip-path: inset(0 100% 0 0);
      animation:
        navLogoReveal 720ms cubic-bezier(0.22, 1, 0.36, 1) 120ms forwards,
        navLogoRainbow 1400ms linear 120ms both;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .nav-link {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--fg); }

    @keyframes navLogoReveal {
      from {
        opacity: 0;
        clip-path: inset(0 100% 0 0);
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        clip-path: inset(0 0 0 0);
        transform: translateY(0);
      }
    }

    @keyframes navLogoRainbow {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }

    @keyframes contentReveal {
      from {
        opacity: 0;
        translate: 0 12px;
      }
      to {
        opacity: 1;
        translate: 0 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .nav-logo,
      .hero .eyebrow,
      .hero h1,
      .intro,
      .toolbar,
      .card,
      .empty,
      .footer-year {
        opacity: 1;
        translate: none;
        clip-path: none;
        transform: none;
        animation: none;
        transition: none;
      }
    }

    /* Shell */
    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 72px 32px 80px;
    }

    /* Hero */
    .hero {
      padding-bottom: 14px;
      margin-bottom: 0;
    }
    .hero .eyebrow,
    .hero h1,
    .intro,
    .toolbar {
      opacity: 0;
      animation: contentReveal 640ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .hero .eyebrow { animation-delay: 180ms; }
    .hero h1 { animation-delay: 260ms; }
    .intro { animation-delay: 340ms; }
    .toolbar { animation-delay: 430ms; }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 16px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 20px;
      height: 1.5px;
      background: currentColor;
      border-radius: 2px;
    }

    h1 {
      font-family: var(--font-display);
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .intro {
      max-width: 72ch;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }
    .intro-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .intro-chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 13px;
      border: 1px solid oklch(88% 0.01 250);
      border-radius: 999px;
      background: oklch(96% 0.006 250);
      color: oklch(30% 0.012 250);
      font-size: 13px;
      line-height: 1;
      letter-spacing: 0.01em;
    }

    /* Profile card — grid variant */
    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .profile-card strong {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      display: block;
      margin-bottom: 2px;
    }
    .profile-roles {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      letter-spacing: -0.005em;
    }
    .profile-about {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .profile-about p {
      margin: 0;
    }
    .profile-about p + p {
      margin-top: 10px;
    }
    .profile-card {
      align-self: start;
    }
    .profile-card .meta {
      height: 100%;
      min-height: 0;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }
    .profile-card .profile-about {
      min-height: 0;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, #000 82%, transparent 100%);
      mask-image: linear-gradient(to bottom, #000 82%, transparent 100%);
    }
    .button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 16px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      background: var(--fg);
      color: var(--bg);
      transition: opacity 0.15s;
    }
    .button:hover { opacity: 0.8; }

    /* Toolbar */
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-top: 10px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.15s;
    }
    .toolbar:focus-within { border-bottom-color: var(--accent); }
    .count {
      flex-shrink: 0;
      padding-bottom: 8px;
      font-size: 13px;
      color: var(--subtle);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }
    .search {
      flex: 1;
      min-width: 0;
      height: 34px;
      border: 0;
      border-radius: 0;
      padding: 0 0 8px;
      font-size: 16px;
      color: var(--fg);
      background: transparent;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .search::placeholder {
      color: var(--subtle);
      font-size: 13px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      align-items: start;
      gap: 20px;
    }

    .card {
      position: relative;
      display: grid;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      overflow: hidden;
      text-decoration: none;
      color: var(--fg);
      opacity: 0;
      animation: contentReveal 640ms cubic-bezier(0.22, 1, 0.36, 1) var(--reveal-delay, 520ms) both;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      border-color: oklch(85% 0.005 250);
      box-shadow: 0 4px 24px oklch(18% 0.012 250 / 0.07);
      transform: translateY(-2px);
    }

    .preview {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: var(--accent-dim);
      border-bottom: 1px solid var(--border);
    }
    .preview iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      border: 0;
      transform-origin: top left;
      pointer-events: none;
      overflow: hidden;
    }
    .preview::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, oklch(100% 0 0 / 0.3), transparent 60%);
    }

    .meta {
      display: grid;
      gap: 8px;
      padding: 18px 18px 20px;
    }
    .title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.015em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-info .title { white-space: pre-line; overflow: visible; text-overflow: unset; }
    .description {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }
    .open-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .open-row .open-label {
      color: var(--accent);
      font-weight: 500;
      font-size: 13px;
      opacity: 0;
      visibility: hidden;
      transform: translateX(-4px);
      transition: opacity 0.15s, visibility 0.15s, transform 0.15s;
    }
    .card:hover .open-label,
    .card:focus-within .open-label {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
    }
    .file-pill {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 44px 24px;
      background: transparent;
      border: none;
      box-shadow: none;
      opacity: 0;
      animation: contentReveal 640ms cubic-bezier(0.22, 1, 0.36, 1) 140ms both;
    }
    .empty-icon {
      flex-shrink: 0;
      color: var(--muted);
      opacity: 0.78;
      overflow: visible;
    }
    .empty-icon-ring,
    .empty-icon-mark {
      stroke: url(#empty-icon-rainbow);
      filter: drop-shadow(0 0 8px oklch(58% 0.18 255 / 0.16));
    }
    .empty-icon-ring {
      stroke-dasharray: 113;
      stroke-dashoffset: 113;
      transform-origin: 20px 20px;
      animation:
        emptyIconDraw 780ms cubic-bezier(0.22, 1, 0.36, 1) 80ms forwards,
        emptyIconSpin 1100ms cubic-bezier(0.22, 1, 0.36, 1) 80ms forwards;
    }
    .empty-icon-line {
      stroke-dasharray: 10;
      stroke-dashoffset: 10;
      animation: emptyIconDraw 520ms cubic-bezier(0.22, 1, 0.36, 1) 460ms forwards;
    }
    .empty-icon-dot {
      opacity: 0;
      transform-origin: 20px 27px;
      animation: emptyIconPop 360ms cubic-bezier(0.22, 1.55, 0.36, 1) 760ms forwards;
    }
    @keyframes emptyIconDraw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes emptyIconSpin {
      from { transform: rotate(-28deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes emptyIconPop {
      from { opacity: 0; transform: scale(0.35); }
      to { opacity: 1; transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .empty-icon-ring,
      .empty-icon-line,
      .empty-icon-dot {
        animation: none;
        stroke-dashoffset: 0;
        opacity: 1;
        transform: none;
      }
    }
    .empty-body { text-align: center; }
    .empty-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: -0.01em;
      line-height: 1.4;
    }
    .empty-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 2px;
    }
    .empty-action {
      margin-top: 4px;
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--fg);
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .empty-action:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    footer {
      border-top: 1px solid var(--border);
      margin-top: 48px;
      padding-top: 24px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: center;
    }
    .footer-year {
      display: inline-block;
      min-width: 4ch;
      opacity: 0;
      clip-path: inset(0 0 100% 0);
      transform: translateY(10px);
      transition:
        opacity 560ms cubic-bezier(0.22, 1, 0.36, 1),
        clip-path 720ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 720ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, clip-path, transform;
    }
    footer.is-visible .footer-year {
      opacity: 1;
      clip-path: inset(0 0 0 0);
      transform: translateY(0);
    }

    @media (max-width: 760px) {
      .shell { padding: 72px 20px 64px; }
      .nav-inner { padding: 0 20px; }
      .toolbar {
        position: relative;
        padding-top: 4px;
        border-bottom-color: transparent;
      }
      .toolbar:focus-within { border-bottom-color: transparent; }
      .toolbar::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        height: 1px;
        background: var(--border);
      }
      .toolbar:focus-within::after { background: var(--accent); }
      .toolbar.is-search-active {
        position: sticky;
        top: 56px;
        z-index: 95;
        margin-left: -20px;
        margin-right: -20px;
        padding: 4px 20px 0;
        border-bottom-color: transparent;
        background: oklch(99% 0.002 240 / 0.88);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      body.mobile-search-active {
        padding-top: 56px;
      }
      body.mobile-search-active nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: var(--bg);
        transform: translate3d(0, var(--mobile-keyboard-offset, 0px), 0);
        will-change: transform;
      }
      body.mobile-search-active .toolbar.is-search-active {
        position: fixed;
        top: 56px;
        left: 0;
        right: 0;
        margin: 0;
        background: var(--bg);
        transform: translate3d(0, var(--mobile-keyboard-offset, 0px), 0);
        will-change: transform;
      }
      body.mobile-search-active .hero {
        display: none;
      }
      body.mobile-search-active .grid {
        padding-top: 43px;
      }
      .toolbar.is-search-active.is-search-pinned {
        border-bottom-color: var(--border);
      }
      .toolbar.is-search-active::after {
        left: 20px;
        right: 20px;
      }
      .open-row .open-label {
        opacity: 1;
        visibility: visible;
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="https://timurproko.com/" class="nav-logo">Timur Prokopiev</a>
      <div class="nav-links" aria-label="Navigation">
        <a href="cv/" class="nav-link" data-presentation-link="cv">CV</a>
        <a href="https://www.linkedin.com/in/timurproko/" class="nav-link" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>
      </div>
    </div>
  </nav>

  <main class="shell">
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">Portfolio</p>
      <h1 id="page-title">Building Interactive Experiences</h1>
      <p class="intro">
        A collection of my work, experiments, and ideas across technologies.
        <span class="intro-chips" aria-label="Focus areas">
          <span class="intro-chip">UX</span>
          <span class="intro-chip">XR</span>
          <span class="intro-chip">AI</span>
        </span>
      </p>
    </section>

    <div class="toolbar" aria-label="Presentation controls">
      <input class="search" id="search" type="text" role="searchbox" placeholder="Search content" autocomplete="off" />
      <div class="count" id="count">Finding presentations…</div>
    </div>

    <section class="grid" id="presentations" aria-live="polite"></section>

    <footer>
      <span class="footer-year" data-footer-year aria-label="Current year">0000</span>
    </footer>
  </main>

  <script>
    // Static fallback for hosts that do not expose a directory listing/API.
    // This list was generated from the current folder when index.html was created.
    const FALLBACK_PRESENTATIONS = ["ai-for-unity", "cv"];
    const TITLE_OVERRIDES = {
      "ai-for-unity": "AI for Unity\nDevelopment",
      "cv": "Unity Developer\nCV"
    };
    const DEFAULT_DESCRIPTION = "Agentic Engineering workflows for Unity Developers.";

    const grid = document.getElementById("presentations");
    const count = document.getElementById("count");
    const search = document.getElementById("search");
    const toolbar = document.querySelector(".toolbar");
    const footerYear = document.querySelector("[data-footer-year]");
    let presentations = [];
    let profileHeightFrame = 0;
    let footerRevealSetupFrame = 0;
    let footerRevealSetupTimer = 0;
    let blockNextCardClick = false;
    let pendingMobileSearchBlur = null;
    let mobileViewportFrame = 0;

    const ro = new ResizeObserver(entries => {
      for (const entry of entries) {
        const iframe = entry.target.querySelector("iframe");
        if (iframe) {
          const s = entry.contentRect.width / 1920;
          iframe.style.transform = `scale(${s})`;
        }
      }
    });

    function scheduleFooterYearAnimationSetup() {
      if (!footerYear || footerRevealSetupFrame || footerRevealSetupTimer) return;

      // The landing grid is populated asynchronously. If the footer observer is
      // attached while the grid is still empty, the footer starts in the viewport
      // and the year reveal runs before the user reaches the bottom. Wait for the
      // first content render and a short layout-settle window before observing it.
      footerRevealSetupFrame = requestAnimationFrame(() => {
        footerRevealSetupFrame = requestAnimationFrame(() => {
          footerRevealSetupFrame = 0;
          footerRevealSetupTimer = window.setTimeout(() => {
            footerRevealSetupTimer = 0;
            setupFooterYearAnimation();
          }, 180);
        });
      });
    }

    function setupFooterYearAnimation() {
      if (!footerYear) return;

      const footer = footerYear.closest("footer");
      const targetYear = new Date().getFullYear();
      const targetText = String(targetYear);
      const reducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)").matches;
      let hasAnimated = false;

      footerYear.textContent = "0".repeat(targetText.length);
      footerYear.setAttribute("aria-label", targetText);

      function finish() {
        footer?.classList.add("is-visible");
        footerYear.textContent = targetText;
      }

      function reveal() {
        if (hasAnimated) return;
        hasAnimated = true;
        footer?.classList.add("is-visible");

        if (reducedMotion) {
          footerYear.textContent = targetText;
          return;
        }

        const duration = 1400;
        const startTime = performance.now();
        const easeOutCubic = progress => 1 - Math.pow(1 - progress, 3);

        function tick(now) {
          const progress = Math.min((now - startTime) / duration, 1);
          const value = Math.round(targetYear * easeOutCubic(progress));
          footerYear.textContent = String(value).padStart(targetText.length, "0");

          if (progress < 1) {
            requestAnimationFrame(tick);
            return;
          }

          finish();
        }

        requestAnimationFrame(tick);
      }

      if (!("IntersectionObserver" in window) || !footer) {
        reveal();
        return;
      }

      const observer = new IntersectionObserver(entries => {
        if (!entries.some(entry => entry.isIntersecting)) return;
        observer.disconnect();
        reveal();
      }, { threshold: 0.35 });

      observer.observe(footer);
    }

    function makeCard(item) {
      const card = document.createElement("a");
      card.className = "card";
      card.href = presentationUrl(item.file);
      card.dataset.file = item.file;
      card.setAttribute("aria-label", `Open ${item.title}`);
      card.innerHTML = `
        <div class="preview" aria-hidden="true">
          <iframe title="Preview of ${escapeHtml(item.title)}" data-src="${previewUrl(item.file)}" loading="eager" tabindex="-1" scrolling="no"></iframe>
        </div>
        <div class="meta">
          <h2 class="title">${escapeHtml(item.title).replace(/\n/g, ' ')}</h2>
          <p class="description">${escapeHtml(item.description)}</p>
          <div class="open-row">
            <span></span>
            <span class="open-label">Open →</span>
          </div>
        </div>
      `;

      // After the deck loads, lock it to slide 1 regardless of localStorage state.
      const iframe = card.querySelector("iframe");
      iframe.addEventListener("load", () => {
        try {
          const idoc = iframe.contentDocument || iframe.contentWindow.document;
          // Suppress any internal scroll.
          idoc.documentElement.style.cssText += ";overflow:hidden!important";
          idoc.body.style.cssText += ";overflow:hidden!important";
          // Reset to first slide.
          iframe.contentWindow.scrollTo({ left: 0, top: 0, behavior: "auto" });
          idoc.documentElement.scrollLeft = 0;
          idoc.body.scrollLeft = 0;
          const slides = idoc.querySelectorAll(".slide");
          slides.forEach((s, i) => s.classList.toggle("active", i === 0));
          const cur = idoc.getElementById("deck-cur");
          if (cur) cur.textContent = "01";

          updateCardMeta(
            item.file,
            idoc.querySelector("title")?.textContent?.trim(),
            idoc.querySelector('meta[name="description"]')?.content?.trim()
          );
        } catch (_) {}
      });
      iframe.src = iframe.dataset.src;

      return card;
    }

    window.addEventListener("message", event => {
      const data = event.data;
      if (!data || data.type !== "page-meta" || !data.file) return;
      updateCardMeta(data.file, data.title, data.description);
    });

    window.addEventListener("resize", scheduleProfileCardHeightSync);

    init();

    async function init() {
      document.querySelectorAll("[data-presentation-link]").forEach(link => {
        link.href = presentationUrl(link.dataset.presentationLink);
      });

      const files = await discoverPresentationFiles();
      presentations = await Promise.all(files.map(loadPresentationMeta));
      render(presentations);
      scheduleFooterYearAnimationSetup();
      setupMobileSearchInteractions();
      updateSearchState();
      search.addEventListener("input", () => {
        const query = search.value.trim().toLowerCase();
        const filtered = presentations.filter(item =>
          [item.title, item.description, item.file].join(" ").toLowerCase().includes(query)
        );
        updateSearchState();
        render(filtered, query);
        requestAnimationFrame(() => search.focus({ preventScroll: true }));
      });
    }

    function setupMobileSearchInteractions() {
      search.addEventListener("focus", updateSearchState);
      search.addEventListener("blur", updateSearchState);
      window.addEventListener("scroll", () => {
        clearPendingMobileSearchBlur();
        updateSearchPinnedState();
      }, { passive: true });
      window.addEventListener("resize", () => {
        scheduleMobileViewportOffsetUpdate();
        updateSearchPinnedState();
      });
      window.visualViewport?.addEventListener("resize", () => {
        scheduleMobileViewportOffsetUpdate();
        updateSearchPinnedState();
      });

      document.addEventListener("pointerdown", event => {
        if (!isMobileSearchFocused()) return;
        if (toolbar?.contains(event.target)) return;

        clearPendingMobileSearchBlur();
        pendingMobileSearchBlur = {
          pointerId: event.pointerId,
          target: event.target,
          startX: event.clientX,
          startY: event.clientY,
          shouldBlockCardClick: Boolean(event.target.closest?.(".card")),
          timer: window.setTimeout(commitPendingMobileSearchBlur, 260)
        };
      }, true);

      document.addEventListener("pointermove", event => {
        if (!pendingMobileSearchBlur || pendingMobileSearchBlur.pointerId !== event.pointerId) return;
        const dx = Math.abs(event.clientX - pendingMobileSearchBlur.startX);
        const dy = Math.abs(event.clientY - pendingMobileSearchBlur.startY);
        if (dx > 8 || dy > 8) clearPendingMobileSearchBlur();
      }, true);

      document.addEventListener("pointerup", event => {
        if (!pendingMobileSearchBlur || pendingMobileSearchBlur.pointerId !== event.pointerId) return;
        commitPendingMobileSearchBlur();
      }, true);

      document.addEventListener("pointercancel", event => {
        if (!pendingMobileSearchBlur || pendingMobileSearchBlur.pointerId !== event.pointerId) return;
        clearPendingMobileSearchBlur();
      }, true);

      document.addEventListener("click", event => {
        if (!blockNextCardClick) return;
        if (!event.target.closest?.(".card")) {
          blockNextCardClick = false;
          return;
        }

        event.preventDefault();
        event.stopPropagation();
        blockNextCardClick = false;
      }, true);
    }

    function clearPendingMobileSearchBlur() {
      if (!pendingMobileSearchBlur) return;
      window.clearTimeout(pendingMobileSearchBlur.timer);
      pendingMobileSearchBlur = null;
    }

    function commitPendingMobileSearchBlur() {
      if (!pendingMobileSearchBlur) return;
      const { shouldBlockCardClick, timer } = pendingMobileSearchBlur;
      window.clearTimeout(timer);
      pendingMobileSearchBlur = null;

      blockNextCardClick = shouldBlockCardClick;
      if (blockNextCardClick) {
        window.setTimeout(() => { blockNextCardClick = false; }, 700);
      }
      search.blur();
      updateSearchState();
    }

    function updateSearchState() {
      const hasSearchText = search.value.trim().length > 0;
      const isFocused = document.activeElement === search;
      const isActiveMobileSearch = (hasSearchText || isFocused) && window.matchMedia("(max-width: 760px)").matches;
      toolbar?.classList.toggle("is-search-active", hasSearchText || isFocused);
      document.body.classList.toggle("mobile-search-active", isActiveMobileSearch);
      scheduleMobileViewportOffsetUpdate();
      window.setTimeout(scheduleMobileViewportOffsetUpdate, 120);
      window.setTimeout(scheduleMobileViewportOffsetUpdate, 360);
      updateSearchPinnedState();
    }

    function scheduleMobileViewportOffsetUpdate() {
      if (mobileViewportFrame) return;
      mobileViewportFrame = requestAnimationFrame(updateMobileViewportOffset);
    }

    function updateMobileViewportOffset() {
      mobileViewportFrame = 0;
      const offset = document.body.classList.contains("mobile-search-active")
        ? Math.max(0, Math.round(window.visualViewport?.offsetTop || 0))
        : 0;
      document.documentElement.style.setProperty("--mobile-keyboard-offset", `${offset}px`);
    }

    function updateSearchPinnedState() {
      if (!toolbar) return;
      const isActiveMobileSearch = toolbar.classList.contains("is-search-active") && window.matchMedia("(max-width: 760px)").matches;
      const isFixedForKeyboard = document.body.classList.contains("mobile-search-active");
      const isPinned = isActiveMobileSearch && (isFixedForKeyboard || toolbar.getBoundingClientRect().top <= 56.5);
      toolbar.classList.toggle("is-search-pinned", isPinned);
    }

    function isMobileSearchFocused() {
      return document.activeElement === search && window.matchMedia("(max-width: 760px)").matches;
    }

    async function discoverPresentationFiles() {
      const sources = await Promise.allSettled([
        discoverFromDirectoryListing(),
        discoverFromGithubApi()
      ]);

      const discovered = sources
        .filter(result => result.status === "fulfilled")
        .flatMap(result => result.value);

      return unique([...discovered, ...FALLBACK_PRESENTATIONS].map(normalizePresentationRoute))
        .filter(isPresentationFile)
        .sort((a, b) => a.localeCompare(b));
    }

    async function discoverFromDirectoryListing() {
      // Works with simple static servers that expose directory indexes.
      const response = await fetch("./", { cache: "no-store" });
      if (!response.ok) return [];
      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      return [...doc.querySelectorAll("a[href]")]
        .map(anchor => anchor.getAttribute("href"))
        .map(normalizeHref)
        .filter(Boolean);
    }

    async function discoverFromGithubApi() {
      // Enables automatic discovery on GitHub Pages without a separate manifest file.
      const apiUrl = githubContentsApiUrl();
      if (!apiUrl) return [];
      const response = await fetch(apiUrl, { cache: "no-store" });
      if (!response.ok) return [];
      const entries = await response.json();
      if (!Array.isArray(entries)) return [];
      return entries
        .filter(entry => entry.type === "file" || entry.type === "dir")
        .map(entry => entry.name)
        .filter(Boolean);
    }

    function githubContentsApiUrl() {
      const host = location.hostname;
      if (!host.endsWith(".github.io")) return null;

      const owner = host.replace(/\.github\.io$/, "");
      const pathParts = location.pathname.split("/").filter(Boolean);
      const repo = pathParts[0] || `${owner}.github.io`;
      const folderParts = pathParts.slice(1, location.pathname.endsWith("/") ? undefined : -1);
      const folder = folderParts.length ? `/${folderParts.join("/")}` : "";
      return `https://api.github.com/repos/${owner}/${repo}/contents${folder}`;
    }

    async function loadPresentationMeta(file) {
      const fallbackTitle = TITLE_OVERRIDES[file] || titleFromFile(file);
      try {
        const response = await fetch(cacheBustedUrl(file, "meta"), { cache: "no-store" });
        if (!response.ok) throw new Error("Unable to fetch presentation");
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        const title = doc.querySelector("title")?.textContent?.trim() || fallbackTitle;
        const description =
          doc.querySelector('meta[name="description"]')?.content?.trim() ||
          doc.querySelector("h1")?.textContent?.trim() ||
          DEFAULT_DESCRIPTION;
        return { file, title, description };
      } catch (error) {
        return { file, title: fallbackTitle, description: DEFAULT_DESCRIPTION };
      }
    }

    function render(items, query) {
      const visibleItemCount = query ? items.length : items.length + 1;
      count.textContent = `${visibleItemCount} item${visibleItemCount === 1 ? "" : "s"}`;
      grid.innerHTML = "";

      // Show empty message (no profile card) when searching with no results
      if (query && !items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = `
          <svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <defs>
              <linearGradient id="empty-icon-rainbow" x1="4" y1="6" x2="36" y2="34" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#ff4d6d"/>
                <stop offset="22%" stop-color="#ffb703"/>
                <stop offset="44%" stop-color="#3ddc97"/>
                <stop offset="66%" stop-color="#3a86ff"/>
                <stop offset="84%" stop-color="#b517ff"/>
                <stop offset="100%" stop-color="#ff4d6d"/>
              </linearGradient>
            </defs>
            <circle class="empty-icon-ring" cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
            <path class="empty-icon-mark empty-icon-line" d="M20 12v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle class="empty-icon-mark empty-icon-dot" cx="20" cy="27" r="1.5" fill="url(#empty-icon-rainbow)"/>
          </svg>
          <div class="empty-body">
            <div class="empty-title">No content found.</div>
            <div class="empty-sub">Try a different search term.</div>
          </div>
          <button class="empty-action" type="button">Clear search</button>
        `;
        empty.querySelector(".empty-action").addEventListener("click", () => {
          search.value = "";
          render(presentations);
          search.focus();
        });
        grid.appendChild(empty);
        return;
      }

      // Profile card — only shown when no search is active
      if (query) {
        items.forEach((item, index) => {
          const card = makeCard(item);
          card.style.setProperty("--reveal-delay", `${140 + index * 60}ms`);
          grid.appendChild(card);
        });
        grid.querySelectorAll(".preview").forEach(p => ro.observe(p));
        return;
      }

      // Profile card — first in the grid when no search
      const profile = document.createElement("a");
      profile.className = "card profile-card";
      profile.href = "https://www.linkedin.com/in/timurproko/";
      profile.target = "_blank";
      profile.rel = "noopener noreferrer";
      profile.setAttribute("aria-label", "Open Timur Prokopiev LinkedIn profile");
      profile.innerHTML = `
        <div class="meta" style="gap:12px;">
          <div class="profile-header">
            <img class="profile-avatar" src="https://media.licdn.com/dms/image/v2/D4D03AQGMJVUHPnj-pQ/profile-displayphoto-scale_400_400/B4DZvQFuzqKAAg-/0/1768722723419?e=1782950400&v=beta&t=jDqlIQYM84ZuNQ_P6UaN0KtceFona36ki2TENL95YBw" alt="Timur Prokopiev" />
            <div>
              <strong class="title" style="display:block;">Timur Prokopiev</strong>
              <p class="profile-roles">UX / XR / Unity Developer, Tech Artist, AI Agentic Engineer</p>
            </div>
          </div>
          <div class="profile-about">
            <p>Unity Developer with experience building interactive digital products and immersive real-time experiences. I work at the intersection of product design, 3D graphics, and XR development, translating complex ideas into clear, intuitive interactions.</p>
            <p>I’ve designed and built products across web, mobile, wearables, embedded systems, and AR/VR/XR platforms, combining a design-led approach to interaction and visual systems with hands-on technical execution in Unity and real-time pipelines.</p>
            <p>I focus on products and prototypes for training, medical visualization, and immersive applications—prioritizing usability, clarity, and performance from concept through implementation.</p>
          </div>
          <div class="open-row">
            <span></span>
            <span class="open-label">LinkedIn ↗</span>
          </div>
        </div>
      `;
      profile.style.setProperty("--reveal-delay", "520ms");
      grid.appendChild(profile);

      const landingItems = [
        ...items.filter(item => item.file === "cv"),
        ...items.filter(item => item.file !== "cv")
      ];
      const fragment = document.createDocumentFragment();
      for (const [index, item] of landingItems.entries()) {
        const card = makeCard(item);
        card.style.setProperty("--reveal-delay", `${580 + index * 70}ms`);
        fragment.appendChild(card);
      }
      grid.appendChild(fragment);
      grid.querySelectorAll(".preview").forEach(p => ro.observe(p));
      scheduleProfileCardHeightSync();
    }

    function scheduleProfileCardHeightSync() {
      cancelAnimationFrame(profileHeightFrame);
      profileHeightFrame = requestAnimationFrame(syncProfileCardHeight);
    }

    function syncProfileCardHeight() {
      const profileCard = grid.querySelector(".profile-card");
      const referenceCard = grid.querySelector(".card:not(.profile-card)");
      if (!profileCard || !referenceCard) return;
      profileCard.style.height = `${Math.ceil(referenceCard.getBoundingClientRect().height)}px`;
    }

    function updateCardMeta(file, title, description) {
      const item = presentations.find(entry => entry.file === file);
      if (item) {
        if (title) item.title = title;
        if (description) item.description = description;
      }

      document.querySelectorAll(`.card[data-file="${cssEscape(file)}"]`).forEach(card => {
        if (title) {
          card.setAttribute("aria-label", `Open ${title}`);
          const titleElement = card.querySelector(".title");
          if (titleElement) titleElement.textContent = title;
          const iframe = card.querySelector("iframe");
          if (iframe) iframe.title = `Preview of ${title}`;
        }
        if (description) {
          const descriptionElement = card.querySelector(".description");
          if (descriptionElement) descriptionElement.textContent = description;
        }
      });
      scheduleProfileCardHeightSync();
    }

    function normalizeHref(href) {
      if (!href || href.startsWith("?") || href.startsWith("#")) return null;
      try {
        const url = new URL(href, location.href);
        if (url.origin !== location.origin || url.pathname.includes("/../")) return null;
        const currentFolder = location.pathname.endsWith("/")
          ? location.pathname
          : location.pathname.slice(0, location.pathname.lastIndexOf("/") + 1);
        if (!url.pathname.startsWith(currentFolder)) return null;
        return decodeURIComponent(url.pathname.slice(currentFolder.length));
      } catch (error) {
        return href;
      }
    }

    function isPresentationFile(file) {
      if (FALLBACK_PRESENTATIONS.includes(file)) return true;
      return /\.html?$/i.test(file) && !/^index\.html?$/i.test(file) && !file.includes("/");
    }

    function normalizePresentationRoute(file) {
      return String(file)
        .replace(/\/index\.html?$/i, "")
        .replace(/\/$/, "");
    }

    function previewUrl(file) {
      return cacheBustedUrl(file, "preview=cover");
    }

    function presentationUrl(file) {
      const normalized = normalizePresentationRoute(file);
      const encoded = encodeURI(normalized);
      if (!/\.html?$/i.test(normalized)) {
        return location.protocol === "file:" ? `${encoded}/index.html` : `${encoded}/`;
      }
      return encoded;
    }

    function cacheBustedUrl(file, query) {
      const url = presentationUrl(file);
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}${query}&v=${Date.now()}`;
    }

    function unique(values) {
      return [...new Set(values.filter(Boolean))];
    }

    function titleFromFile(file) {
      return file
        .replace(/\.html?$/i, "")
        .split(/[-_]+/)
        .filter(Boolean)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    function cssEscape(value) {
      if (window.CSS?.escape) return CSS.escape(value);
      return String(value).replace(/["\\]/g, "\\$&");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));
    }
  </script>
</body>
</html>
