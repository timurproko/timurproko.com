<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Presentation landing page for Timur Prokopiev." />
  <title>Presentations — Timur Prokopiev</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root {
      --bg:      oklch(99% 0.002 240);
      --surface: oklch(100% 0 0);
      --fg:      oklch(18% 0.012 250);
      --muted:   oklch(54% 0.012 250);
      --border:  oklch(92% 0.005 250);
      --accent:  oklch(58% 0.18 255);
      --accent-dim: oklch(58% 0.18 255 / 0.08);
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; }

    /* Nav */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: oklch(99% 0.002 240 / 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
      text-decoration: none;
    }
    .nav-link {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--fg); }

    /* Shell */
    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 72px 32px 80px;
    }

    /* Hero */
    .hero {
      padding-bottom: 48px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 16px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 20px;
      height: 1.5px;
      background: currentColor;
      border-radius: 2px;
    }

    h1 {
      font-family: var(--font-display);
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .intro {
      max-width: 48ch;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    /* Profile card — grid variant */
    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .profile-card strong {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      display: block;
      margin-bottom: 2px;
    }
    .profile-roles {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      letter-spacing: -0.005em;
    }
    .profile-about {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 16px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      background: var(--fg);
      color: var(--bg);
      transition: opacity 0.15s;
    }
    .button:hover { opacity: 0.8; }

    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 24px;
    }
    .count {
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }
    .search {
      width: min(320px, 100%);
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      font-size: 14px;
      color: var(--fg);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }
    .search::placeholder { color: var(--muted); }
    .search:focus { border-color: var(--accent); }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      display: grid;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      overflow: hidden;
      text-decoration: none;
      color: var(--fg);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      border-color: oklch(85% 0.005 250);
      box-shadow: 0 4px 24px oklch(18% 0.012 250 / 0.07);
      transform: translateY(-2px);
    }

    .preview {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: var(--accent-dim);
      border-bottom: 1px solid var(--border);
    }
    .preview iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      border: 0;
      transform-origin: top left;
      pointer-events: none;
      overflow: hidden;
    }
    .preview::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, oklch(100% 0 0 / 0.3), transparent 60%);
    }

    .meta {
      display: grid;
      gap: 8px;
      padding: 18px 18px 20px;
    }
    .title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.015em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-info .title { white-space: pre-line; overflow: visible; text-overflow: unset; }
    .description {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }
    .open-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .open-row .open-label {
      color: var(--accent);
      font-weight: 500;
      font-size: 13px;
    }
    .file-pill {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 40px 24px;
      background: transparent;
      border: none;
      box-shadow: none;
    }
    .empty-icon {
      flex-shrink: 0;
      color: var(--muted);
      opacity: 0.5;
    }
    .empty-body { text-align: center; }
    .empty-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: -0.01em;
      line-height: 1.4;
    }
    .empty-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 2px;
    }

    footer {
      border-top: 1px solid var(--border);
      margin-top: 48px;
      padding-top: 24px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 760px) {
      .shell { padding: 40px 20px 64px; }
      .nav-inner { padding: 0 20px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="#" class="nav-logo">Timur Prokopiev</a>
      <a href="https://www.linkedin.com/in/timurproko/" class="nav-link" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>
    </div>
  </nav>

  <main class="shell">
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">Presentation Library</p>
      <h1 id="page-title">Talks &amp; decks</h1>
      <p class="intro">
        Here you'll find my talks and presentation decks — open any of them with a click.
      </p>
    </section>

    <div class="toolbar" aria-label="Presentation controls">
      <input class="search" id="search" type="search" placeholder="Search presentations" autocomplete="off" />
      <div class="count" id="count">Finding presentations…</div>
    </div>

    <section class="grid" id="presentations" aria-live="polite"></section>

    <footer>
      2026
    </footer>
  </main>

  <script>
    // Static fallback for hosts that do not expose a directory listing/API.
    // This list was generated from the current folder when index.html was created.
    const FALLBACK_PRESENTATIONS = ["ai-for-unity.html"];
    const TITLE_OVERRIDES = {
      "ai-for-unity.html": "AI for Unity\nDevelopment"
    };

    const grid = document.getElementById("presentations");
    const count = document.getElementById("count");
    const search = document.getElementById("search");
    let presentations = [];

    const ro = new ResizeObserver(entries => {
      for (const entry of entries) {
        const iframe = entry.target.querySelector("iframe");
        if (iframe) {
          const s = entry.contentRect.width / 1920;
          iframe.style.transform = `scale(${s})`;
        }
      }
    });

    function makeCard(item) {
      const card = document.createElement("a");
      card.className = "card";
      card.href = item.file;
      card.setAttribute("aria-label", `Open ${item.title}`);
      card.innerHTML = `
        <div class="preview" aria-hidden="true">
          <iframe title="Preview of ${escapeHtml(item.title)}" src="${encodeURI(item.file)}" loading="lazy" tabindex="-1" scrolling="no"></iframe>
        </div>
        <div class="meta">
          <h2 class="title">${escapeHtml(item.title).replace(/\n/g, ' ')}</h2>
          <p class="description">${escapeHtml(item.description)}</p>
          <div class="open-row">
            <span class="file-pill">${escapeHtml(item.file)}</span>
            <span class="open-label">Open →</span>
          </div>
        </div>
      `;

      // After the deck loads, lock it to slide 1 regardless of localStorage state.
      const iframe = card.querySelector("iframe");
      iframe.addEventListener("load", () => {
        try {
          const idoc = iframe.contentDocument || iframe.contentWindow.document;
          // Suppress any internal scroll.
          idoc.documentElement.style.cssText += ";overflow:hidden!important";
          idoc.body.style.cssText += ";overflow:hidden!important";
          // Reset to first slide.
          const slides = idoc.querySelectorAll(".slide");
          slides.forEach((s, i) => s.classList.toggle("active", i === 0));
          const cur = idoc.getElementById("deck-cur");
          if (cur) cur.textContent = "01";
        } catch (_) {}
      });

      return card;
    }

    init();

    async function init() {
      const files = await discoverPresentationFiles();
      presentations = await Promise.all(files.map(loadPresentationMeta));
      render(presentations);
      search.addEventListener("input", () => {
        const query = search.value.trim().toLowerCase();
        const filtered = presentations.filter(item =>
          [item.title, item.description, item.file].join(" ").toLowerCase().includes(query)
        );
        render(filtered, query);
      });
    }

    async function discoverPresentationFiles() {
      const sources = await Promise.allSettled([
        discoverFromDirectoryListing(),
        discoverFromGithubApi()
      ]);

      const discovered = sources
        .filter(result => result.status === "fulfilled")
        .flatMap(result => result.value);

      return unique([...discovered, ...FALLBACK_PRESENTATIONS])
        .filter(isPresentationFile)
        .sort((a, b) => a.localeCompare(b));
    }

    async function discoverFromDirectoryListing() {
      // Works with simple static servers that expose directory indexes.
      const response = await fetch("./", { cache: "no-store" });
      if (!response.ok) return [];
      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      return [...doc.querySelectorAll("a[href]")]
        .map(anchor => anchor.getAttribute("href"))
        .map(normalizeHref)
        .filter(Boolean);
    }

    async function discoverFromGithubApi() {
      // Enables automatic discovery on GitHub Pages without a separate manifest file.
      const apiUrl = githubContentsApiUrl();
      if (!apiUrl) return [];
      const response = await fetch(apiUrl, { cache: "no-store" });
      if (!response.ok) return [];
      const entries = await response.json();
      if (!Array.isArray(entries)) return [];
      return entries
        .filter(entry => entry.type === "file")
        .map(entry => entry.name)
        .filter(Boolean);
    }

    function githubContentsApiUrl() {
      const host = location.hostname;
      if (!host.endsWith(".github.io")) return null;

      const owner = host.replace(/\.github\.io$/, "");
      const pathParts = location.pathname.split("/").filter(Boolean);
      const repo = pathParts[0] || `${owner}.github.io`;
      const folderParts = pathParts.slice(1, location.pathname.endsWith("/") ? undefined : -1);
      const folder = folderParts.length ? `/${folderParts.join("/")}` : "";
      return `https://api.github.com/repos/${owner}/${repo}/contents${folder}`;
    }

    async function loadPresentationMeta(file) {
      const fallbackTitle = TITLE_OVERRIDES[file] || titleFromFile(file);
      try {
        const response = await fetch(file, { cache: "no-store" });
        if (!response.ok) throw new Error("Unable to fetch presentation");
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        const title = doc.querySelector("title")?.textContent?.trim() || fallbackTitle;
        const description =
          doc.querySelector('meta[name="description"]')?.content?.trim() ||
          doc.querySelector("h1")?.textContent?.trim() ||
          "Agentic Engineering workflows for Unity Developers.";
        return { file, title, description };
      } catch (error) {
        return { file, title: fallbackTitle, description: "Agentic Engineering workflows for Unity Developers." };
      }
    }

    function render(items, query) {
      count.textContent = `${items.length} presentation${items.length === 1 ? "" : "s"}`;
      grid.innerHTML = "";

      // Show empty message (no profile card) when searching with no results
      if (query && !items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = `
          <svg class="empty-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
            <path d="M20 12v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="20" cy="27" r="1.5" fill="currentColor"/>
          </svg>
          <div class="empty-body">
            <div class="empty-title">No presentations found.</div>
            <div class="empty-sub">Try a different search term.</div>
          </div>
        `;
        grid.appendChild(empty);
        return;
      }

      // Profile card — only shown when no search is active
      if (query) {
        items.forEach(item => grid.appendChild(makeCard(item)));
        grid.querySelectorAll(".preview").forEach(p => ro.observe(p));
        return;
      }

      // Profile card — first in the grid when no search
      const profile = document.createElement("div");
      profile.className = "card";
      profile.setAttribute("aria-label", "Speaker profile");
      profile.innerHTML = `
        <div class="meta" style="gap:12px;">
          <div class="profile-header">
            <img class="profile-avatar" src="https://media.licdn.com/dms/image/v2/D4D03AQGMJVUHPnj-pQ/profile-displayphoto-scale_400_400/B4DZvQFuzqKAAg-/0/1768722723419?e=1782950400&v=beta&t=jDqlIQYM84ZuNQ_P6UaN0KtceFona36ki2TENL95YBw" alt="Timur Prokopiev" />
            <div>
              <strong class="title" style="display:block;">Timur Prokopiev</strong>
              <p class="profile-roles">UX / XR Developer · Unity Developer<br>Tech Artist · AI Agentic Engineer</p>
            </div>
          </div>
          <p class="profile-about">Unity Developer with experience building interactive digital products and immersive real-time experiences. I work at the intersection of product design, 3D graphics, and XR development, translating complex ideas into clear, intuitive interactions.</p>
          <div class="open-row">
            <span></span>
            <a class="open-label" href="https://www.linkedin.com/in/timurproko/" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="text-decoration:none;">LinkedIn profile →</a>
          </div>
        </div>
      `;
      grid.appendChild(profile);

      const fragment = document.createDocumentFragment();
      for (const item of items) {
        fragment.appendChild(makeCard(item));
      }
      grid.appendChild(fragment);
      grid.querySelectorAll(".preview").forEach(p => ro.observe(p));
    }

    function normalizeHref(href) {
      if (!href || href.startsWith("?") || href.startsWith("#")) return null;
      try {
        const url = new URL(href, location.href);
        if (url.origin !== location.origin || url.pathname.includes("/../")) return null;
        const currentFolder = location.pathname.endsWith("/")
          ? location.pathname
          : location.pathname.slice(0, location.pathname.lastIndexOf("/") + 1);
        if (!url.pathname.startsWith(currentFolder)) return null;
        return decodeURIComponent(url.pathname.slice(currentFolder.length));
      } catch (error) {
        return href;
      }
    }

    function isPresentationFile(file) {
      return /\.html?$/i.test(file) && !/^index\.html?$/i.test(file) && !file.includes("/");
    }

    function unique(values) {
      return [...new Set(values.filter(Boolean))];
    }

    function titleFromFile(file) {
      return file
        .replace(/\.html?$/i, "")
        .split(/[-_]+/)
        .filter(Boolean)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));
    }
  </script>
</body>
</html>
